<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cipher | Small Encryption Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(12px);
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .card-title i {
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        textarea,
        input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 14px;
            font-family: inherit;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        textarea:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            flex: 1;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-icon {
            padding: 8px 12px;
            font-size: 0.85rem;
            flex: 0;
        }

        .error-toast, .success-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .error-toast {
            background: var(--error);
            color: white;
        }

        .success-toast {
            background: var(--success);
            color: white;
        }

        .toast-show {
            transform: translateY(0);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px;
            }
            .button-row {
                flex-direction: column;
            }
            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Secure Cipher</h1>
            <p class="subtitle">Professional Grade Text Encryption</p>
        </header>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title"><i class="fas fa-keyboard"></i> Input Message</h2>
                <button id="paste-btn" class="btn btn-secondary btn-icon" title="Paste from clipboard">
                    <i class="fas fa-paste"></i> Paste
                </button>
            </div>
            <div class="input-group">
                <label for="input">Message to process</label>
                <textarea id="input" placeholder="Type or paste your message here..."></textarea>
            </div>

            <div class="input-group">
                <label for="seed">Secret Seed (Encryption Key)</label>
                <input type="password" id="seed" placeholder="Enter a secure phrase">
            </div>
        </div>

        <div class="button-row">
            <button id="encode-btn" class="btn btn-primary"><i class="fas fa-lock"></i> Encode</button>
            <button id="decode-btn" class="btn btn-secondary"><i class="fas fa-unlock"></i> Decode</button>
            <button id="clear-btn" class="btn btn-secondary" style="flex: 0; color: var(--error);"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title"><i class="fas fa-file-alt"></i> Processed Result</h2>
                <button id="copy-btn" class="btn btn-secondary btn-icon" title="Copy to clipboard">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <textarea id="output" placeholder="Your result will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="footer">
            <p>Secure Cipher Tool &bull; CC by <a href="https://premmalik.in" target="_blank">premmalik.in</a></p>
        </div>
    </div>

    <!-- Toasts -->
    <div id="error-toast" class="error-toast">
        <i class="fas fa-exclamation-circle"></i>
        <span id="error-message"></span>
    </div>

    <div id="success-toast" class="success-toast">
        <i class="fas fa-check-circle"></i>
        <span id="success-message"></span>
    </div>

    <script>
        // DOM Elements
        const inputElement = document.getElementById('input');
        const seedElement = document.getElementById('seed');
        const outputElement = document.getElementById('output');
        const encodeBtn = document.getElementById('encode-btn');
        const decodeBtn = document.getElementById('decode-btn');
        const clearBtn = document.getElementById('clear-btn');
        const copyBtn = document.getElementById('copy-btn');
        const pasteBtn = document.getElementById('paste-btn');
        
        const errorToast = document.getElementById('error-toast');
        const successToast = document.getElementById('success-toast');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');

        // Notification System
        function showNotification(type, message) {
            const toast = type === 'error' ? errorToast : successToast;
            const messageElement = type === 'error' ? errorMessage : successMessage;
            
            messageElement.textContent = message;
            toast.classList.add('toast-show');
            
            setTimeout(() => {
                toast.classList.remove('toast-show');
            }, 3000);
        }

        // Clipboard Actions
        async function copyToClipboard() {
            if (!outputElement.value) {
                showNotification('error', 'Nothing to copy!');
                return;
            }
            try {
                await navigator.clipboard.writeText(outputElement.value);
                showNotification('success', 'Copied to clipboard!');
            } catch (err) {
                showNotification('error', 'Failed to copy');
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                inputElement.value = text;
                showNotification('success', 'Pasted from clipboard!');
            } catch (err) {
                showNotification('error', 'Failed to paste. Check permissions.');
            }
        }

        // Encryption Core
        async function generateKeyStream(length, seed) {
            let keyStream = new Uint8Array(length);
            let counter = 0;
            let generated = 0;

            let seedHash = CryptoJS.SHA256(seed).toString(CryptoJS.enc.Hex);
            let hashBuffer = new Uint8Array(32);
            for (let i = 0; i < 32; i++) {
                hashBuffer[i] = parseInt(seedHash.substr(i * 2, 2), 16);
            }

            while (generated < length) {
                const inputStream = new Uint8Array(36);
                inputStream.set(hashBuffer, 0);
                inputStream[32] = (counter >> 24) & 0xFF;
                inputStream[33] = (counter >> 16) & 0xFF;
                inputStream[34] = (counter >> 8) & 0xFF;
                inputStream[35] = counter & 0xFF;

                const currentHash = CryptoJS.SHA256(CryptoJS.lib.WordArray.create(inputStream))
                    .toString(CryptoJS.enc.Hex);

                const hashArray = new Uint8Array(32);
                for (let i = 0; i < 32; i++) {
                    hashArray[i] = parseInt(currentHash.substr(i * 2, 2), 16);
                }

                const bytesNeeded = Math.min(hashArray.length, length - generated);
                keyStream.set(hashArray.subarray(0, bytesNeeded), generated);
                generated += bytesNeeded;
                counter++;
                hashBuffer = hashArray;
            }

            return keyStream;
        }

        function xorBytes(a, b) {
            const result = new Uint8Array(a.length);
            for (let i = 0; i < a.length; i++) {
                result[i] = a[i] ^ b[i];
            }
            return result;
        }

        // App Actions
        async function encodeMessage() {
            try {
                const message = inputElement.value.trim();
                const seed = seedElement.value;

                if (!message) return showNotification('error', 'Enter a message to encode');
                if (!seed) return showNotification('error', 'Enter a secret seed');

                const encoder = new TextEncoder();
                const messageBytes = encoder.encode(message);
                const keyStream = await generateKeyStream(messageBytes.length, seed);

                const encodedBytes = xorBytes(messageBytes, keyStream);
                const encodedString = btoa(String.fromCharCode.apply(null, encodedBytes));

                outputElement.value = encodedString;
                showNotification('success', 'Message encoded');
            } catch (error) {
                showNotification('error', 'Encoding failed');
            }
        }

        async function decodeMessage() {
            try {
                const encodedString = inputElement.value.trim();
                const seed = seedElement.value;

                if (!encodedString) return showNotification('error', 'Enter content to decode');
                if (!seed) return showNotification('error', 'Enter the secret seed');

                const decodedBytes = Uint8Array.from(atob(encodedString), c => c.charCodeAt(0));
                const keyStream = await generateKeyStream(decodedBytes.length, seed);

                const messageBytes = xorBytes(decodedBytes, keyStream);
                const message = new TextDecoder().decode(messageBytes);

                outputElement.value = message;
                showNotification('success', 'Message decoded');
            } catch (error) {
                showNotification('error', 'Decoding failed - Check seed or content');
            }
        }

        // Listeners
        encodeBtn.addEventListener('click', encodeMessage);
        decodeBtn.addEventListener('click', decodeMessage);
        copyBtn.addEventListener('click', copyToClipboard);
        pasteBtn.addEventListener('click', pasteFromClipboard);
        
        clearBtn.addEventListener('click', () => {
            inputElement.value = '';
            outputElement.value = '';
            seedElement.value = '';
            showNotification('success', 'Fields cleared');
        });

        // Key bindings
        inputElement.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                encodeMessage();
            }
        });

        // Init
        window.addEventListener('load', () => {
            inputElement.value = "Welcome to Secure Cipher.\nYour security is our priority.";
        });
    </script>
</body>

</html>
